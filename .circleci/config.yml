version: 2.1
orbs:
  android: circleci/android@2.4.0
jobs:
  build:
    executor:
      name: android/android-machine
      resource-class: large
      tag: 2024.04.1
    steps:
      - checkout


# Node.js 22 の有効化からビルドまでを「1つのステップ」で一気に実行する
      - run:
          name: Install Node.js 22 & Build App
          command: |
            # 1. マシンに内蔵されている nvm を読み込む
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            # 2. Node.js 22 をインストールして使用する
            nvm install 22
            nvm use 22
            node -v # ここで v22.x.x と表示されれば大成功です
            
            # 3. 同じ環境のまま依存関係のインストールとCapacitorのビルドを行う
            npm install
            npm run cap:build

# Androidのネイティブコードをビルド（ここを修正します）
      - run:
          name: Build Android App
          command: |
            cd android          # ★追加：androidフォルダの中に移動する
            ./gradlew assembleDebug

      # 生成されたapkファイルを保存（ここもパスを android/ 内に修正します）
      - store_artifacts:
          path: android/app/build/outputs/apk/debug/   # ★修正：android/ を頭に付けます
          destination: apks

          # ─── ここから下を追加 ───
workflows:
  manual_pipeline:
    jobs:
      # 1. 最初の一時停止ボタン（手動承認）を定義
      - request_approve:
          type: approval
      # 2. 承認されたら、実際のビルドジョブを実行する
      - build:
          requires:
            - request_approve