version: 2.1
orbs:
  android: circleci/android@2.4.0
jobs:
  build:
    executor:
      name: android/android-machine
      resource-class: large
      tag: 2024.04.1 # エラーの原因となっていた必須のタグを追加
    steps:
      - checkout

      # Node.js依存関係のインストール
      - run:
          name: Install Dependencies
          command: npm install

      # Capacitorのビルド（Android用のWeb資産を生成）
      - run:
          name: Build Capacitor
          command: npm run cap:build

      # Androidのネイティブコードをビルド（apkを生成）
      - run:
          name: Build Android App
          command: ./gradlew assembleDebug

      # 生成されたapkファイルをCircleCI上に保存（ダウンロード可能にする）
      - store_artifacts:
          path: app/build/outputs/apk/debug/
          destination: apks