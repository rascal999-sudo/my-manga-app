version: 2.1
orbs:
  android: circleci/android@2.4.0
jobs:
  build-and-test:
    executor:
      name: android/android-machine
      resource-class: large
      tag: 2024.04.1
    steps:
      - checkout

      # 1. Node.js 22 の有効化からCapacitorビルドまでを実行
      - run:
          name: Install Node.js 22 & Build App
          command: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm install 22
            nvm use 22
            node -v
            npm install
            npm run cap:build

      # 2. Androidのネイティブコードをデバッグモードでビルド
      - run:
          name: Build Android App
          command: |
            cd android
            ./gradlew assembleDebug

      # 3. 生成されたAPKファイルをCircleCIの成果物として保存
      - store_artifacts:
          path: android/app/build/outputs/apk/debug/
          destination: apks

      # 4. 生成されたデバッグ版APKをBrowserStackにアップロード
      - run:
          name: Upload APK to BrowserStack
          command: |
            # 実際に生成されたデバッグ版APKのパスを指定します
            APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
            
            RESPONSE=$(curl -u "$BROWSERSTACK_USERNAME:$BROWSERSTACK_ACCESS_KEY" \
              -X POST "https://api-cloud.browserstack.com/app-automate/upload" \
              -F "file=@$APK_PATH")
            
            echo "Upload Response: $RESPONSE"
            
            APP_URL=$(echo $RESPONSE | jq -r '.app_url')
            echo "Uploaded APP_URL: $APP_URL"
            
            echo "export BROWSERSTACK_APP_URL=$APP_URL" >> $BASH_ENV

      # 5. BrowserStackでテストを実行
      - run:
          name: Trigger BrowserStack Appium Tests
          command: |
            source $BASH_ENV
            
            if [ -n "$BROWSERSTACK_APP_URL" ]; then
              # 必要に応じてNode.js 22の環境をここでも利用可能にする
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
              nvm use 22
              
              # テストを実行（※テスト用のスクリプト名に合わせて変更してください）
              npm run test:appium
            else
              echo "APP_URL の取得に失敗したため、テストをスキップします。"
              exit 1
            fi

# ワークフローの定義
workflows:
  v1:
    jobs:
      - build-and-test